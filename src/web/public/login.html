<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Energy Device Gateway</title>
  <link rel="icon" href="/logo.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #eef3f4;
      --panel: rgba(255, 255, 255, 0.94);
      --line: rgba(17, 32, 42, 0.1);
      --line-strong: rgba(17, 32, 42, 0.16);
      --ink: #11202a;
      --muted: #5a6872;
      --accent: #0f8b8d;
      --accent-deep: #0d5f73;
      --radius: 22px;
      --shadow: 0 18px 40px rgba(9, 20, 38, 0.08);
      --heading: "Space Grotesk", sans-serif;
      --body: "IBM Plex Sans", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: var(--body);
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(15, 139, 141, 0.08), transparent 26rem),
        linear-gradient(180deg, #f6f9fa 0%, var(--bg) 100%);
    }

    .panel {
      width: min(100%, 460px);
      border-radius: 28px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 18px 20px;
      color: #fff;
      background: rgba(11, 19, 39, 0.96);
    }

    .brand-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      flex-shrink: 0;
    }

    .brand-mark img {
      display: block;
      width: 28px;
      height: 28px;
      filter: drop-shadow(0 6px 16px rgba(96, 165, 250, 0.18));
    }

    .panel-head strong {
      display: block;
      font-family: var(--heading);
      font-size: 18px;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .panel-head span {
      display: block;
      color: rgba(255, 255, 255, 0.72);
      font-size: 12px;
      line-height: 1.2;
    }

    .panel-body {
      padding: 22px 20px 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-family: var(--heading);
      font-size: 30px;
      line-height: 1;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.55;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 13px 14px;
      border-radius: 14px;
      border: 1px solid var(--line-strong);
      background: #fff;
      color: var(--ink);
      font: inherit;
    }

    input:focus {
      outline: none;
      border-color: rgba(15, 139, 141, 0.42);
      box-shadow: 0 0 0 0.22rem rgba(15, 139, 141, 0.14);
    }

    input[readonly] {
      background: #eef2f3;
      color: #73808d;
    }

    button {
      width: 100%;
      margin-top: 16px;
      padding: 13px 14px;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-deep) 100%);
      box-shadow: 0 12px 24px rgba(13, 95, 115, 0.18);
    }

    .status {
      margin-top: 12px;
      min-height: 20px;
      color: var(--muted);
      font-size: 14px;
    }

    .status.error { color: #b13b2f; }

    .note {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(15, 139, 141, 0.08);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .stack {
      display: grid;
      gap: 14px;
    }

    [hidden] {
      display: none !important;
    }
  </style>
</head>
<body>
  <main class="panel">
    <div class="panel-head">
      <span class="brand-mark" aria-hidden="true">
        <img src="/logo.svg" alt="">
      </span>
      <div>
        <strong>Energy Device Gateway</strong>
        <span>Administrator access</span>
      </div>
    </div>
    <div class="panel-body">
      <h1 id="title">Login</h1>
      <p id="description">Use the local gateway administrator account to access live status and settings.</p>

      <form class="stack" id="login-form">
        <div>
          <label for="username">Username</label>
          <input id="username" name="username" type="text" value="admin" autocomplete="username" readonly>
        </div>

        <div>
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required>
        </div>

        <button type="submit">Sign In</button>
      </form>

      <form class="stack" id="setup-form" hidden>
        <div>
          <label for="setup-username">Username</label>
          <input id="setup-username" type="text" value="admin" readonly>
        </div>

        <div>
          <label for="setup-password">New password</label>
          <input id="setup-password" type="password" autocomplete="new-password" required>
        </div>

        <div>
          <label for="setup-confirm">Confirm password</label>
          <input id="setup-confirm" type="password" autocomplete="new-password" required>
        </div>

        <button type="submit">Set Administrator Password</button>
      </form>

      <div class="status" id="status"></div>
      <div class="note" id="note">Loading authentication state...</div>
    </div>
  </main>
  <script>
    const loginForm = document.getElementById('login-form');
    const setupForm = document.getElementById('setup-form');
    const status = document.getElementById('status');
    const username = document.getElementById('username');
    const setupUsername = document.getElementById('setup-username');
    const note = document.getElementById('note');
    const title = document.getElementById('title');
    const description = document.getElementById('description');

    let minimumPasswordLength = 8;

    function setStatus(message, isError = false) {
      status.className = isError ? 'status error' : 'status';
      status.textContent = message;
    }

    function setMode(session) {
      minimumPasswordLength = Number(session.minimumPasswordLength) || 8;
      username.value = session.username || 'admin';
      setupUsername.value = session.username || 'admin';

      if (session.setupRequired) {
        title.textContent = 'Initialize Admin Password';
        description.textContent = 'This gateway has not been initialized yet. Set the administrator password before continuing.';
        loginForm.hidden = true;
        setupForm.hidden = false;
        note.innerHTML = `Create a password with at least <strong>${minimumPasswordLength} characters</strong>. It will be stored as a one-way hash.`;
        return;
      }

      title.textContent = 'Login';
      description.textContent = 'Use the local gateway administrator account to access live status and settings.';
      loginForm.hidden = false;
      setupForm.hidden = true;

      if (session.authManagedByEnvironment) {
        const source = session.authEnvironmentVariable || 'an environment variable';
        note.innerHTML = `Username stays <strong>admin</strong>. Password is managed by <code>${source}</code> and cannot be changed from the UI.`;
      } else {
        note.innerHTML = `Username stays <strong>admin</strong>. Use the password configured during setup. Password changes stay available in Settings.`;
      }
    }

    async function checkSession() {
      const response = await fetch('/api/auth/session', { credentials: 'include' });
      const data = await response.json();

      if (data.authenticated === true) {
        window.location.href = '/';
        return;
      }

      setMode(data);
    }

    loginForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      setStatus('Signing in...');

      const response = await fetch('/api/auth/login', {
        method: 'POST',
        credentials: 'include',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({
          username: username.value,
          password: document.getElementById('password').value
        })
      });
      const data = await response.json();

      if (!response.ok || data.error) {
        setStatus(data.error || 'Login failed', true);
        if (response.status === 409) {
          await checkSession();
        }
        return;
      }

      window.location.href = '/';
    });

    setupForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      setStatus('Saving administrator password...');

      const response = await fetch('/api/auth/bootstrap', {
        method: 'POST',
        credentials: 'include',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({
          newPassword: document.getElementById('setup-password').value,
          confirmPassword: document.getElementById('setup-confirm').value
        })
      });
      const data = await response.json();

      if (!response.ok || data.error) {
        setStatus(data.error || 'Failed to initialize password', true);
        if (response.status === 409) {
          await checkSession();
        }
        return;
      }

      window.location.href = '/';
    });

    checkSession().catch(() => {
      setStatus('Failed to read authentication state', true);
    });
  </script>
</body>
</html>
